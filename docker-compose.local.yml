services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_KEY}
      - DATABASE_ENABLED=false
      - WEBHOOK_GLOBAL_URL=http://webhook:9000/webhook/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped
    networks:
      - ramotors

  webhook:
    build: ./worker
    container_name: ramotors-webhook
    command: uvicorn app.webhook_server:app --host 0.0.0.0 --port 9000
    environment:
      - REDIS_URL=${REDIS_URL}
      - BACKEND_URL=${BACKEND_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - EVOLUTION_URL=http://evolution-api:8080
      - EVOLUTION_KEY=${EVOLUTION_KEY}
    depends_on:
      - evolution-api
    restart: unless-stopped
    networks:
      - ramotors

  worker:
    build: ./worker
    container_name: ramotors-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q celery
    environment:
      - REDIS_URL=${REDIS_URL}
      - BACKEND_URL=${BACKEND_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - EVOLUTION_URL=http://evolution-api:8080
      - EVOLUTION_KEY=${EVOLUTION_KEY}
    depends_on:
      - evolution-api
    restart: unless-stopped
    networks:
      - ramotors

  beat:
    build: ./worker
    container_name: ramotors-beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - REDIS_URL=${REDIS_URL}
      - BACKEND_URL=${BACKEND_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - EVOLUTION_URL=http://evolution-api:8080
      - EVOLUTION_KEY=${EVOLUTION_KEY}
    depends_on:
      - worker
    restart: unless-stopped
    networks:
      - ramotors

  loop-envios:
    build: ./worker
    container_name: ramotors-loop-envios
    command: python -m app.loop_envios_runner
    environment:
      - REDIS_URL=${REDIS_URL}
      - BACKEND_URL=${BACKEND_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - EVOLUTION_URL=http://evolution-api:8080
      - EVOLUTION_KEY=${EVOLUTION_KEY}
    depends_on:
      - worker
    restart: unless-stopped
    networks:
      - ramotors

volumes:
  evolution_data:

networks:
  ramotors:
    driver: bridge
