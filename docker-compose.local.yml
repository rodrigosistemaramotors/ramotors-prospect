services:
  worker:
    build: ./worker
    container_name: ramotors-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q celery
    environment:
      - REDIS_URL=${REDIS_URL}?ssl_cert_reqs=CERT_NONE
      - BACKEND_URL=${BACKEND_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - ZAPI_INSTANCE_ID=${ZAPI_INSTANCE_ID}
      - ZAPI_TOKEN=${ZAPI_TOKEN}
      - ZAPI_CLIENT_TOKEN=${ZAPI_CLIENT_TOKEN:-}
    restart: unless-stopped
    networks:
      - ramotors

  beat:
    build: ./worker
    container_name: ramotors-beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - REDIS_URL=${REDIS_URL}?ssl_cert_reqs=CERT_NONE
      - BACKEND_URL=${BACKEND_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - ZAPI_INSTANCE_ID=${ZAPI_INSTANCE_ID}
      - ZAPI_TOKEN=${ZAPI_TOKEN}
      - ZAPI_CLIENT_TOKEN=${ZAPI_CLIENT_TOKEN:-}
    depends_on:
      - worker
    restart: unless-stopped
    networks:
      - ramotors

  loop-envios:
    build: ./worker
    container_name: ramotors-loop-envios
    command: python -m app.loop_envios_runner
    environment:
      - REDIS_URL=${REDIS_URL}?ssl_cert_reqs=CERT_NONE
      - BACKEND_URL=${BACKEND_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - ZAPI_INSTANCE_ID=${ZAPI_INSTANCE_ID}
      - ZAPI_TOKEN=${ZAPI_TOKEN}
      - ZAPI_CLIENT_TOKEN=${ZAPI_CLIENT_TOKEN:-}
    depends_on:
      - worker
    restart: unless-stopped
    networks:
      - ramotors

networks:
  ramotors:
    driver: bridge
